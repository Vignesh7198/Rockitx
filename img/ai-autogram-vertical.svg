  <g transform="translate(24 418)">
    <rect width="100" height="88" rx="12" fill="rgba(56,189,248,.12)" stroke="rgba(56,189,248,.35)" stroke-width="1.5"/>
    <rect x="10" y="10" width="80" height="44" rx="6" fill="url(#neon)" opacity=".35"/>
    <rect x="16" y="18" width="48" height="6" rx="2" fill="rgba(255,255,255,.8)"/>
    <rect x="16" y="28" width="64" height="4" rx="2" fill="rgba(255,255,255,.4)"/>
    <rect x="10" y="60" width="56" height="5" rx="2" fill="rgba(255,255,255,.35)"/>
  </g>
  <g transform="translate(130 418)">
    <rect width="100" height="88" rx="12" fill="rgba(124,108,255,.14)" stroke="rgba(124,108,255,.35)" stroke-width="1.5"/>
    <rect x="10" y="10" width="80" height="44" rx="6" fill="rgba(16,185,129,.25)"/>
    <rect x="16" y="18" width="52" height="6" rx="2" fill="rgba(255,255,255,.8)"/>
    <rect x="16" y="28" width="68" height="4" rx="2" fill="rgba(255,255,255,.4)"/>
    <rect x="10" y="60" width="60" height="5" rx="2" fill="rgba(255,255,255,.35)"/>
  </g>
  <g transform="translate(236 418)">
    <rect width="100" height="88" rx="12" fill="rgba(221,42,123,.12)" stroke="rgba(221,42,123,.35)" stroke-width="1.5"/>
    <rect x="10" y="10" width="80" height="44" rx="6" fill="rgba(245,133,41,.3)"/>
    <rect x="16" y="18" width="44" height="6" rx="2" fill="rgba(255,255,255,.8)"/>
    <rect x="16" y="28" width="60" height="4" rx="2" fill="rgba(255,255,255,.4)"/>
    <rect x="10" y="60" width="52" height="5" rx="2" fill="rgba(255,255,255,.35)"/>
  </g>

  <!-- autopilot flow lines -->
  <path d="M180 240 Q180 270 98 290" stroke="url(#neon)" stroke-width="1.5" opacity=".45" stroke-dasharray="4 4"/>
  <path d="M180 240 Q180 270 262 290" stroke="url(#neon)" stroke-width="1.5" opacity=".45" stroke-dasharray="4 4"/>
  <path d="M180 240 Q180 360 180 418" stroke="url(#ig)" stroke-width="1.5" opacity=".35" stroke-dasharray="4 4"/>

  <!-- bottom instagram phone -->
  <rect x="118" y="528" width="124" height="88" rx="16" fill="#0b0b14" stroke="url(#ig)" stroke-width="2"/>
  <rect x="128" y="540" width="104" height="56" rx="6" fill="#151228"/>
  <rect x="136" y="548" width="88" height="32" rx="4" fill="url(#ig)" opacity=".7"/>
  <rect x="144" y="556" width="48" height="5" rx="2" fill="rgba(255,255,255,.85)"/>
  <rect x="144" y="564" width="64" height="4" rx="2" fill="rgba(255,255,255,.45)"/>
  <circle cx="148" cy="592" r="4" stroke="#fff" stroke-width="1.2" fill="none"/>
  <rect x="160" y="588" width="20" height="8" rx="2" fill="rgba(255,255,255,.15)"/>
  <rect x="188" y="588" width="32" height="8" rx="4" fill="url(#ig)" opacity=".8"/>
</svg>
