<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="50%" stop-color="#12081f"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F58529"/>
      <stop offset="50%" stop-color="#DD2A7B"/>
      <stop offset="100%" stop-color="#8134AF"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C6CFF"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="360" height="640" fill="url(#bg)"/>
  <ellipse cx="180" cy="200" rx="140" ry="100" fill="#8134AF" opacity=".12"/>
  <ellipse cx="180" cy="420" rx="160" ry="120" fill="#DD2A7B" opacity=".08"/>

  <!-- schedule badge top -->
  <rect x="24" y="24" width="132" height="36" rx="12" fill="rgba(124,108,255,.18)" stroke="rgba(124,108,255,.4)" stroke-width="1.5"/>
  <circle cx="44" cy="42" r="10" fill="url(#neon)" opacity=".85"/>
  <path d="M44 38v5l3 2" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="58" y="34" width="56" height="6" rx="3" fill="rgba(255,255,255,.75)"/>
  <rect x="58" y="44" width="88" height="5" rx="2" fill="rgba(255,255,255,.35)"/>

