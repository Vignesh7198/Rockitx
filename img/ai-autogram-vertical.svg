  <rect x="158" y="178" width="44" height="36" rx="14" fill="#1a1035"/>
  <circle cx="168" cy="192" r="5" fill="#C084FC"/>
  <circle cx="192" cy="192" r="5" fill="#C084FC"/>
  <path d="M166 204 Q180 210 194 204" stroke="#C084FC" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="180" y1="168" x2="180" y2="152" stroke="#9b9db5" stroke-width="3"/>
  <circle cx="180" cy="148" r="6" fill="url(#neon)"/>
  <path d="M148 198 Q120 188 108 210" stroke="#e8e8f0" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M212 198 Q240 188 252 210" stroke="#e8e8f0" stroke-width="10" stroke-linecap="round" fill="none"/>
  <circle cx="108" cy="210" r="8" fill="#f4f4fa"/>
  <circle cx="252" cy="210" r="8" fill="#f4f4fa"/>
  <!-- sparkles -->
  <path d="M180 130 L182 124 L184 130 L190 132 L184 134 L182 140 L180 134 L174 132 Z" fill="#FBBF24" filter="url(#glow)"/>
  <path d="M130 160 L131 156 L132 160 L136 161 L132 162 L131 166 L130 162 L126 161 Z" fill="#F472B6" opacity=".9"/>
  <path d="M228 156 L229 152 L230 156 L234 157 L230 158 L229 162 L228 158 L224 157 Z" fill="#38BDF8" opacity=".9"/>

  <!-- marketing post -->
  <g transform="translate(24 290)">
    <rect width="148" height="108" rx="14" fill="rgba(221,42,123,.15)" stroke="url(#ig)" stroke-width="1.5"/>
    <rect x="12" y="12" width="124" height="56" rx="8" fill="url(#ig)" opacity=".75"/>
    <rect x="20" y="22" width="72" height="8" rx="3" fill="rgba(255,255,255,.9)"/>
    <rect x="20" y="36" width="96" height="5" rx="2" fill="rgba(255,255,255,.5)"/>
    <rect x="20" y="46" width="64" height="5" rx="2" fill="rgba(255,255,255,.35)"/>
    <rect x="12" y="76" width="48" height="18" rx="6" fill="rgba(255,255,255,.2)"/>
    <circle cx="128" cy="86" r="10" stroke="#fff" stroke-width="1.5" fill="none" opacity=".7"/>
