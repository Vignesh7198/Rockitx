  <!-- birthday post -->
  <g transform="translate(188 290)">
    <rect width="148" height="108" rx="14" fill="rgba(245,133,41,.12)" stroke="rgba(245,133,41,.45)" stroke-width="1.5"/>
    <rect x="12" y="12" width="124" height="56" rx="8" fill="rgba(129,52,175,.35)"/>
    <circle cx="74" cy="36" r="14" fill="#fcd9b6"/>
    <path d="M60 34 Q74 22 88 34" fill="#2d1f1a"/>
    <ellipse cx="58" cy="28" rx="5" ry="7" fill="#F472B6" opacity=".8"/>
