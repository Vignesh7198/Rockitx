<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" fill="none">
  <defs>
    <linearGradient id="rx-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f35"/>
      <stop offset="45%" stop-color="#0f1a42"/>
      <stop offset="100%" stop-color="#12081f"/>
    </linearGradient>
    <linearGradient id="rx-neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C6CFF"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="rx-desk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2550"/>
      <stop offset="100%" stop-color="#151228"/>
    </linearGradient>
    <filter id="rx-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="360" height="220" fill="url(#rx-bg)"/>
  <!-- ambient glow -->
  <ellipse cx="180" cy="95" rx="120" ry="70" fill="#7C6CFF" opacity=".12"/>
  <ellipse cx="260" cy="120" rx="80" ry="50" fill="#38BDF8" opacity=".1"/>
  <!-- neon arch -->
  <path d="M60 40 Q180 10 300 40" stroke="url(#rx-neon)" stroke-width="2" opacity=".35" fill="none"/>
  <!-- desk -->
  <rect x="70" y="128" width="220" height="14" rx="4" fill="url(#rx-desk)"/>
  <rect x="70" y="128" width="220" height="3" rx="1.5" fill="url(#rx-neon)" opacity=".7"/>
  <rect x="70" y="141" width="220" height="2" rx="1" fill="#38BDF8" opacity=".5"/>
  <!-- robot body -->
  <ellipse cx="180" cy="118" rx="38" ry="10" fill="#e8e8f0" opacity=".9"/>
  <rect x="158" y="78" width="44" height="42" rx="18" fill="#f4f4fa"/>
  <rect x="166" y="86" width="28" height="22" rx="8" fill="#1a1035"/>
  <!-- robot face -->
  <circle cx="172" cy="96" r="3" fill="#C084FC"/>
  <circle cx="188" cy="96" r="3" fill="#C084FC"/>
  <path d="M170 104 Q180 108 190 104" stroke="#C084FC" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- headset -->
  <path d="M158 90 Q152 82 158 76" stroke="#9b9db5" stroke-width="2.5" fill="none"/>
  <circle cx="154" cy="92" r="5" fill="#6b7280"/>
  <line x1="149" y1="92" x2="142" y2="98" stroke="#9b9db5" stroke-width="2"/>
  <!-- robot arm gesture -->
  <path d="M198 100 Q215 88 228 78" stroke="#e8e8f0" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="228" cy="78" r="6" fill="#f4f4fa"/>
  <!-- holographic chat panel -->
  <rect x="228" y="52" width="108" height="88" rx="10" fill="rgba(56,189,248,.08)" stroke="rgba(56,189,248,.35)" stroke-width="1.5"/>
  <rect x="228" y="52" width="108" height="88" rx="10" fill="url(#rx-neon)" opacity=".04"/>
  <!-- visitor question bubble -->
  <rect x="236" y="60" width="92" height="22" rx="8" fill="rgba(124,108,255,.35)" stroke="rgba(167,139,250,.5)" stroke-width="1"/>
  <text x="244" y="74" font-family="Segoe UI,system-ui,sans-serif" font-size="8" font-weight="700" fill="#E9D5FF">What are your hours?</text>
  <!-- AI answer bubble -->
  <rect x="236" y="84" width="92" height="22" rx="8" fill="rgba(56,189,248,.25)" stroke="rgba(56,189,248,.45)" stroke-width="1"/>
  <text x="244" y="98" font-family="Segoe UI,system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#BAE6FD">Open 9 AM  6 PM daily!</text>
  <!-- typing indicator -->
  <rect x="236" y="108" width="52" height="16" rx="8" fill="rgba(124,108,255,.2)"/>
  <circle cx="248" cy="116" r="2.5" fill="#C084FC"/>
  <circle cx="258" cy="116" r="2.5" fill="#C084FC" opacity=".6"/>
  <circle cx="268" cy="116" r="2.5" fill="#C084FC" opacity=".3"/>
  <!-- cartoon visitor -->
  <ellipse cx="108" cy="175" rx="22" ry="6" fill="#000" opacity=".25"/>
  <!-- legs -->
  <rect x="98" y="158" width="10" height="22" rx="4" fill="#1e293b"/>
  <rect x="112" y="158" width="10" height="22" rx="4" fill="#1e293b"/>
  <!-- body / hoodie -->
  <path d="M88 148 Q108 138 128 148 L126 162 Q108 168 90 162 Z" fill="#1e3a5f"/>
  <path d="M92 148 L108 155 L124 148" stroke="#38BDF8" stroke-width="1.5" fill="none" opacity=".5"/>
  <!-- head -->
  <circle cx="108" cy="132" r="16" fill="#fcd9b6"/>
  <!-- hair -->
  <path d="M92 130 Q96 118 108 116 Q120 118 124 130 Q120 124 108 122 Q96 124 92 130" fill="#2d1f1a"/>
  <!-- question bubble from visitor -->
  <rect x="24" y="108" width="58" height="28" rx="10" fill="rgba(124,108,255,.3)" stroke="rgba(167,139,250,.55)" stroke-width="1.5" filter="url(#rx-glow)"/>
  <text x="32" y="122" font-family="Segoe UI,system-ui,sans-serif" font-size="7" font-weight="800" fill="#F3E8FF">Do you ship</text>
  <text x="32" y="130" font-family="Segoe UI,system-ui,sans-serif" font-size="7" font-weight="800" fill="#F3E8FF">to my city?</text>
  <path d="M78 128 L88 132" stroke="rgba(167,139,250,.5)" stroke-width="1.5" fill="none"/>
  <!-- small plant -->
  <rect x="52" y="148" width="14" height="10" rx="2" fill="#374151"/>
  <circle cx="59" cy="144" r="8" fill="#22c55e" opacity=".7"/>
  <circle cx="54" cy="140" r="5" fill="#16a34a" opacity=".6"/>
</svg>
