<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" fill="none">
  <defs>
    <linearGradient id="ag-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d1028"/>
      <stop offset="45%" stop-color="#2a0f35"/>
      <stop offset="100%" stop-color="#12081f"/>
    </linearGradient>
    <linearGradient id="ag-ig" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F58529"/>
      <stop offset="48%" stop-color="#DD2A7B"/>
      <stop offset="100%" stop-color="#8134AF"/>
    </linearGradient>
    <linearGradient id="ag-neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F58529"/>
      <stop offset="100%" stop-color="#DD2A7B"/>
    </linearGradient>
    <filter id="ag-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="360" height="220" fill="url(#ag-bg)"/>
  <ellipse cx="180" cy="95" rx="130" ry="75" fill="#DD2A7B" opacity=".1"/>
  <ellipse cx="280" cy="130" rx="70" ry="45" fill="#F58529" opacity=".08"/>

  <!-- phone frame -->
  <rect x="118" y="28" width="124" height="164" rx="18" fill="#0b0b14" stroke="url(#ag-ig)" stroke-width="2"/>
  <rect x="126" y="40" width="108" height="132" rx="6" fill="#151228"/>
  <circle cx="180" cy="34" r="3" fill="#444"/>

  <!-- poster preview inside phone -->
  <rect x="132" y="46" width="96" height="72" rx="6" fill="url(#ag-ig)" opacity=".85"/>
  <rect x="140" y="54" width="52" height="8" rx="3" fill="rgba(255,255,255,.85)"/>
  <rect x="140" y="66" width="80" height="5" rx="2" fill="rgba(255,255,255,.55)"/>
  <rect x="140" y="74" width="68" height="5" rx="2" fill="rgba(255,255,255,.4)"/>
  <rect x="140" y="86" width="36" height="14" rx="4" fill="rgba(255,255,255,.25)"/>

  <!-- instagram-style action row -->
  <circle cx="144" cy="130" r="5" stroke="#fff" stroke-width="1.5" fill="none"/>
  <circle cx="144" cy="130" r="2" fill="#fff"/>
  <path d="M158 126 L162 130 L158 134" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <rect x="170" y="126" width="14" height="8" rx="2" stroke="#fff" stroke-width="1.2" fill="none"/>
  <rect x="192" y="126" width="28" height="8" rx="4" fill="rgba(255,255,255,.2)"/>

  <!-- floating poster cards -->
  <g transform="rotate(-8 58 92)">
    <rect x="24" y="72" width="68" height="52" rx="8" fill="rgba(221,42,123,.18)" stroke="rgba(221,42,123,.45)" stroke-width="1.5"/>
    <rect x="32" y="80" width="36" height="6" rx="2" fill="rgba(255,255,255,.7)"/>
    <rect x="32" y="90" width="52" height="4" rx="2" fill="rgba(255,255,255,.35)"/>
    <rect x="32" y="98" width="44" height="4" rx="2" fill="rgba(255,255,255,.25)"/>
    <rect x="32" y="108" width="24" height="8" rx="3" fill="url(#ag-neon)" opacity=".7"/>
  </g>

  <g transform="rotate(10 302 88)">
    <rect x="268" y="64" width="72" height="56" rx="8" fill="rgba(245,133,41,.15)" stroke="rgba(245,133,41,.4)" stroke-width="1.5"/>
    <rect x="276" y="72" width="40" height="6" rx="2" fill="rgba(255,255,255,.65)"/>
    <rect x="276" y="82" width="56" height="4" rx="2" fill="rgba(255,255,255,.3)"/>
    <rect x="276" y="90" width="48" height="4" rx="2" fill="rgba(255,255,255,.22)"/>
    <circle cx="318" cy="108" r="6" fill="url(#ag-ig)" opacity=".8"/>
  </g>

  <!-- schedule chip -->
  <rect x="248" y="148" width="96" height="34" rx="10" fill="rgba(129,52,175,.2)" stroke="rgba(221,42,123,.4)" stroke-width="1.5" filter="url(#ag-glow)"/>
  <circle cx="264" cy="165" r="8" fill="url(#ag-ig)" opacity=".9"/>
  <path d="M264 161 V165 L267 168" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="278" y="162" font-family="Segoe UI,system-ui,sans-serif" font-size="7" font-weight="800" fill="#F9A8D4">Auto-post</text>
  <text x="278" y="173" font-family="Segoe UI,system-ui,sans-serif" font-size="6.5" font-weight="700" fill="#D8B4FE">Mon · Wed · Fri · 10 AM</text>

  <!-- AI sparkle badge -->
  <rect x="28" y="148" width="78" height="34" rx="10" fill="rgba(124,108,255,.18)" stroke="rgba(124,108,255,.4)" stroke-width="1.5"/>
  <text x="38" y="162" font-family="Segoe UI,system-ui,sans-serif" font-size="7" font-weight="800" fill="#C4B5FD">AI Poster</text>
  <text x="38" y="173" font-family="Segoe UI,system-ui,sans-serif" font-size="6.5" font-weight="700" fill="#A78BFA">Branded &amp; ready</text>
  <path d="M96 154 L98 148 L100 154 L106 156 L100 158 L98 164 L96 158 L90 156 Z" fill="#FBBF24" opacity=".9"/>
</svg>
