<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" fill="none">
  <defs>
    <linearGradient id="sw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="50%" stop-color="#0f2540"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="sw-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#7C6CFF"/>
    </linearGradient>
  </defs>
  <rect width="360" height="220" fill="url(#sw-bg)"/>
  <ellipse cx="180" cy="110" rx="130" ry="80" fill="#38BDF8" opacity=".06"/>
  <!-- map grid -->
  <g opacity=".15" stroke="#38BDF8" stroke-width=".5">
    <line x1="0" y1="40" x2="360" y2="40"/><line x1="0" y1="80" x2="360" y2="80"/>
    <line x1="0" y1="120" x2="360" y2="120"/><line x1="0" y1="160" x2="360" y2="160"/>
    <line x1="60" y1="0" x2="60" y2="220"/><line x1="120" y1="0" x2="120" y2="220"/>
    <line x1="180" y1="0" x2="180" y2="220"/><line x1="240" y1="0" x2="240" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
  </g>
  <!-- map pins -->
  <g filter="url(#none)">
    <path d="M90 100 L90 72 Q90 58 104 58 Q118 58 118 72 L118 100 Z" fill="#7C6CFF" opacity=".85"/>
    <circle cx="104" cy="72" r="8" fill="#f4f4fa"/>
    <text x="104" y="76" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="7" font-weight="800" fill="#7C6CFF">12</text>
    <path d="M200 130 L200 98 Q200 84 214 84 Q228 84 228 98 L228 130 Z" fill="#38BDF8" opacity=".9"/>
    <circle cx="214" cy="98" r="8" fill="#f4f4fa"/>
    <text x="214" y="102" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="7" font-weight="800" fill="#0284c7">28</text>
    <path d="M150 155 L150 128 Q150 116 160 116 Q170 116 170 128 L170 155 Z" fill="#A855F7" opacity=".8"/>
    <circle cx="160" cy="128" r="6" fill="#f4f4fa"/>
  </g>
  <!-- search bar -->
  <rect x="48" y="24" width="200" height="32" rx="16" fill="rgba(255,255,255,.08)" stroke="rgba(56,189,248,.4)" stroke-width="1.5"/>
  <circle cx="68" cy="40" r="8" stroke="#38BDF8" stroke-width="2" fill="none"/>
  <line x1="74" y1="46" x2="78" y2="50" stroke="#38BDF8" stroke-width="2"/>
  <text x="88" y="44" font-family="Segoe UI,sans-serif" font-size="9" font-weight="700" fill="#E2E8F0">Dentists in Mumbai</text>
  <!-- excel export card -->
  <rect x="248" y="36" width="88" height="100" rx="10" fill="rgba(16,185,129,.12)" stroke="rgba(16,185,129,.45)" stroke-width="1.5"/>
  <rect x="256" y="48" width="72" height="10" rx="3" fill="rgba(16,185,129,.3)"/>
  <text x="264" y="56" font-family="Segoe UI,sans-serif" font-size="7" font-weight="800" fill="#6EE7B7">EXPORT.xls</text>
  <rect x="256" y="64" width="72" height="6" rx="2" fill="rgba(255,255,255,.12)"/>
  <rect x="256" y="74" width="56" height="6" rx="2" fill="rgba(255,255,255,.1)"/>
  <rect x="256" y="84" width="64" height="6" rx="2" fill="rgba(255,255,255,.1)"/>
  <rect x="256" y="94" width="48" height="6" rx="2" fill="rgba(255,255,255,.08)"/>
  <text x="264" y="118" font-family="Segoe UI,sans-serif" font-size="7" font-weight="700" fill="#34D399">60 leads ready</text>
  <!-- lead rows floating -->
  <rect x="52" y="168" width="256" height="36" rx="8" fill="rgba(124,108,255,.15)" stroke="rgba(124,108,255,.35)" stroke-width="1"/>
  <circle cx="68" cy="186" r="10" fill="url(#sw-accent)" opacity=".8"/>
  <text x="68" y="190" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="8" font-weight="800" fill="#fff">A</text>
  <text x="86" y="182" font-family="Segoe UI,sans-serif" font-size="8" font-weight="700" fill="#E2E8F0">Smile Dental Clinic</text>
  <text x="86" y="194" font-family="Segoe UI,sans-serif" font-size="7" fill="#94A3B8">+91 98xxx · website · address</text>
  <rect x="290" y="176" width="44" height="16" rx="8" fill="rgba(16,185,129,.25)" stroke="rgba(16,185,129,.4)" stroke-width="1"/>
  <text x="302" y="187" font-family="Segoe UI,sans-serif" font-size="6.5" font-weight="800" fill="#6EE7B7">EXPORT</text>
</svg>
